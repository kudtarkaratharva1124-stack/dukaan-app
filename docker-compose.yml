version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: dukaanpro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dukaanpro}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dukaanpro_dev_pw}
      POSTGRES_DB: ${DB_NAME:-dukaanpro}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - dukaanpro_db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dukaanpro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dukaanpro_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-dukaanpro}:${DB_PASSWORD:-dukaanpro_dev_pw}@db:5432/${DB_NAME:-dukaanpro}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./api/src/uploads:/app/src/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    container_name: dukaanpro_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  dukaanpro_db_data:
