server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # React Router client-side routes (e.g. /dashboard, /settings) have no matching
    # file on disk — without this, nginx's default config 404s on refresh or on a
    # direct link to anything other than "/".
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell itself so deploys show up immediately; hashed
    # JS/CSS assets from Vite are safe to cache long-term.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
