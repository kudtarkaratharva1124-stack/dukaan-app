<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DukaanPro — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
        padding: 24px;
      }
      h1 { font-size: 20px; margin: 0; }
      p { margin: 0; color: #64748b; font-size: 14px; }
      button {
        margin-top: 16px;
        padding: 10px 20px;
        background: #0f766e;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>DukaanPro will keep working with your last saved data.<br />Orders and khata entries will sync once you're back online.</p>
    <button onclick="location.reload()">Retry</button>
  </body>
</html>
